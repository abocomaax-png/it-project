<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Course – Personal Course Organizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">Course<span>Hub</span></div>
      <div class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </div>
      <nav id="mainNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="my-courses.html">My Courses</a></li>
          <li><a href="add-course.html" class="active">Add Course</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <div class="page-title">
      <h2>Add New Course</h2>
      <p>Fill in the details below to register a new course.</p>
      <div class="divider"></div>
    </div>

    <section>
      <div class="form-card">
        <form id="addCourseForm" novalidate>

          <!-- Course Name -->
          <div class="form-group">
            <label for="courseName">Course Name <span>*</span></label>
            <input
              type="text"
              id="courseName"
              name="courseName"
              placeholder="e.g. Introduction to Web Development"
              required
            />
          </div>

          <!-- Instructor -->
          <div class="form-group">
            <label for="instructor">Instructor <span>*</span></label>
            <input
              type="text"
              id="instructor"
              name="instructor"
              placeholder="e.g. Dr. Sarah Ahmed"
              required
            />
          </div>

          <!-- Credit Hours & Status -->
          <div class="form-row">
            <div class="form-group">
              <label for="creditHours">Credit Hours <span>*</span></label>
              <input
                type="number"
                id="creditHours"
                name="creditHours"
                min="1"
                max="6"
                placeholder="e.g. 3"
                required
              />
            </div>
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="" disabled selected>Select status</option>
                <option value="upcoming">Upcoming</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              name="notes"
              placeholder="Any additional notes about this course..."
            ></textarea>
          </div>

          <!-- Actions -->
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Course</button>
            <button type="reset" class="btn btn-reset">Clear Form</button>
          </div>

        </form>

        <!-- Success message (hidden by default) -->
        <div id="successMsg" style="
          display:none;
          margin-top:20px;
          padding:14px 18px;
          background:#d4edda;
          color:#155724;
          border-radius:var(--radius);
          font-weight:500;
          font-size:0.9rem;
        ">
          ✅ Course added successfully! <a href="my-courses.html" style="color:var(--primary); text-decoration:underline;">View My Courses →</a>
        </div>
      </div>
    </section>

  </main>

  <script>
    // Mobile nav
    document.getElementById('navToggle').addEventListener('click', function () {
      document.getElementById('mainNav').classList.toggle('open');
    });

    // Form submit
    document.getElementById('addCourseForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('courseName').value.trim();
      const instructor = document.getElementById('instructor').value.trim();
      const hours = document.getElementById('creditHours').value.trim();

      if (!name || !instructor || !hours) {
        alert('Please fill in all required fields.');
        return;
      }

      document.getElementById('successMsg').style.display = 'block';
      this.reset();
      window.scrollTo({ top: document.getElementById('successMsg').offsetTop - 40, behavior: 'smooth' });
    });
  </script>

</body>
</html>
